version: 2.1

jobs:
  build_apk:
    docker:
      - image: cimg/android:2024.01
    steps:
      - checkout

      - run:
          name: 安装 Flutter
          command: |
            git clone https://github.com/flutter/flutter.git -b stable --depth 1 ~/flutter
            echo 'export PATH="$HOME/flutter/bin:$PATH"' >> "$BASH_ENV"
            source "$BASH_ENV"
            flutter --version

      - run:
          name: 生成 Android 工程
          command: |
            source "$BASH_ENV"
            flutter create --platforms=android --project-name=data_analyzer_app .
            rm -rf test
            python3 - \<<'PY'
            from pathlib import Path
            manifest = Path("android/app/src/main/AndroidManifest.xml")
            text = manifest.read_text()
            text = text.replace('android:label="data_analyzer_app"', 'android:label="数据分析仪"')
            manifest.write_text(text)
            for path in Path("android/app/src").glob("**/AndroidManifest.xml"):
                content = path.read_text()
                content = content.replace('<uses-permission android:name="android.permission.INTERNET"/>', '')
                content = content.replace('<uses-permission android:name="android.permission.INTERNET" />', '')
                path.write_text(content)
            PY

      - run:
          name: 获取依赖
          command: |
            source "$BASH_ENV"
            flutter pub get

      - run:
          name: 安装 Android 原生构建工具
          command: |
            sudo apt-get update
            sudo apt-get install -y ninja-build
            yes | sdkmanager "cmake;3.22.1"

      - run:
          name: 检查代码
          command: |
            source "$BASH_ENV"
            flutter analyze

      - run:
          name: 打包 Debug APK
          command: |
            source "$BASH_ENV"
            flutter build apk --debug

      - store_artifacts:
          path: build/app/outputs/flutter-apk/app-debug.apk
          destination: data-analyzer-debug.apk

workflows:
  build:
    jobs:
      - build_apk
