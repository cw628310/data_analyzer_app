version: 2.1

jobs:
  build_apk:
    docker:
      - image: ghcr.io/cirruslabs/flutter:stable
    steps:
      - checkout

      - run:
          name: 检查 Flutter 环境
          command: |
            flutter --version
            flutter doctor -v

      - run:
          name: 生成 Android 工程
          command: |
            flutter create --platforms=android --project-name=data_analyzer_app .
            rm -rf test
            python3 - \<<'PY'
            from pathlib import Path
            manifest = Path("android/app/src/main/AndroidManifest.xml")
            text = manifest.read_text()
            text = text.replace('android:label="data_analyzer_app"', 'android:label="数据分析仪"')
            manifest.write_text(text)
            for path in Path("android/app/src").glob("**/AndroidManifest.xml"):
                content = path.read_text()
                content = content.replace('<uses-permission android:name="android.permission.INTERNET"/>', '')
                content = content.replace('<uses-permission android:name="android.permission.INTERNET" />', '')
                path.write_text(content)
            for gradle_file in [Path("android/app/build.gradle"), Path("android/app/build.gradle.kts")]:
                if gradle_file.exists():
                    import re
                    content = gradle_file.read_text()
                    content = re.sub(r"compileSdk\s*=\s*[^\n]+", "compileSdk = 36", content)
                    content = re.sub(r"compileSdkVersion\s+[^\n]+", "compileSdkVersion 36", content)
                    content = re.sub(r"targetSdk\s*=\s*[^\n]+", "targetSdk = 36", content)
                    content = re.sub(r"targetSdkVersion\s+[^\n]+", "targetSdkVersion 36", content)
                    gradle_file.write_text(content)
                    print(gradle_file.read_text())
            PY

      - run:
          name: 获取依赖
          command: |
            flutter pub get

      - run:
          name: 安装 Android 原生构建工具
          command: |
            apt-get update
            apt-get install -y ninja-build cmake
            set +o pipefail
            yes | sdkmanager --licenses
            set -o pipefail
            sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "cmake;3.22.1" "ndk;27.0.12077973"
            echo 'export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"' >> "$BASH_ENV"
            echo 'export ANDROID_NDK_ROOT="$ANDROID_HOME/ndk/27.0.12077973"' >> "$BASH_ENV"

      - run:
          name: 检查代码
          command: |
            source "$BASH_ENV"
            flutter analyze

      - run:
          name: 打包 Debug APK
          command: |
            source "$BASH_ENV"
            mkdir -p "$HOME/.gradle"
            cat > "$HOME/.gradle/init.gradle" \<<'EOF'
            allprojects { project ->
                project.plugins.withId("com.android.application") {
                    project.android.compileSdkVersion 36
                    project.android.defaultConfig.targetSdkVersion 36
                }
                project.plugins.withId("com.android.library") {
                    project.android.compileSdkVersion 36
                }
            }
            EOF
            flutter build apk --debug

      - store_artifacts:
          path: build/app/outputs/flutter-apk/app-debug.apk
          destination: data-analyzer-debug.apk

workflows:
  build:
    jobs:
      - build_apk
